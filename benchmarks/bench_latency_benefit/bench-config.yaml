      - "--enable-sleep-mode"

  - name: instance3
    model: Qwen/Qwen3-8B
    engine: vllm
    using_venv: true
    venv_path: /home/fanjiang/miniconda3/envs/vllm
    kvcached_env: # kvcached environment variables for this instance
      - "ENABLE_KVCACHED=true"
